<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantri</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
      color: #fff;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 3rem;
    }

    #talk-btn {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 2px solid #222;
      background: #111;
      color: #e5e5e5;
      font-size: 1.1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin: 0 auto 2rem;
    }

    #talk-btn:hover {
      background: #1a1a1a;
      border-color: #333;
      transform: scale(1.03);
    }

    #talk-btn:active {
      transform: scale(0.98);
    }

    #talk-btn.active {
      border-color: #4aff7a;
      background: #0a1f0e;
      animation: pulse 2s ease-in-out infinite;
    }

    #talk-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74, 255, 122, 0.15); }
      50% { box-shadow: 0 0 30px 10px rgba(74, 255, 122, 0.08); }
    }

    .icon { font-size: 3rem; }

    #status {
      font-size: 0.85rem;
      color: #666;
      min-height: 1.5rem;
    }

    #status.info { color: #4a9eff; }
    #status.error { color: #ff4a4a; }
    #status.success { color: #4aff7a; }
  </style>
</head>
<body>
  <div class="container">
    <h1>MANTRI</h1>
    <p class="subtitle">your inbox, as a conversation</p>

    <button id="talk-btn" onclick="toggleChat()">
      <span class="icon" id="btn-icon">&#127908;</span>
      <span id="btn-label">Talk</span>
    </button>

    <div id="status"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
